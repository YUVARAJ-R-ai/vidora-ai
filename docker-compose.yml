services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: vidora
      POSTGRES_PASSWORD: vidora
      POSTGRES_DB: vidora
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vidora -d vidora"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    restart: on-failure
    volumes:
      - ./backend:/app
      - ./uploads:/app/uploads
      - ./frames:/app/frames
      - huggingface_cache:/root/.cache
    environment:
      - PYTHONUNBUFFERED=1
      - DATABASE_URL=postgresql://vidora:vidora@db:5432/vidora
      - OLLAMA_BASE_URL=http://ollama:11434
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - SECRET_KEY=${SECRET_KEY:-vidora-secret-key-change-in-production}
    entrypoint: >
      sh -c "mkdir -p /app/uploads /app/frames && uvicorn main:app --host 0.0.0.0 --port 8000 --reload"
    depends_on:
      db:
        condition: service_healthy
      ollama:
        condition: service_started

  frontend:
    build:
      context: ./frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

volumes:
  postgres_data:
  ollama_data:
  frontend_node_modules:
  huggingface_cache:

